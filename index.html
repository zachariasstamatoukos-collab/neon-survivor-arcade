<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Survivor - Dopamine Intro</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #111; border: 2px solid #00f2ff; box-shadow: 0 0 20px #00f2ff; }
        #start-screen { position: absolute; background: rgba(0,0,0,0.9); padding: 40px; border-radius: 20px; text-align: center; border: 2px solid #00f2ff; z-index: 20; }
        button { background: #00f2ff; color: #000; border: none; padding: 15px 30px; font-size: 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="color: #00f2ff;">NEON SURVIVOR</h1>
    <p>Music will play for 30 seconds only.</p>
    <button onclick="startGame()">START GAME</button>
</div>

<canvas id="gameCanvas"></canvas>

<audio id="bgMusic" src="music.mp3"></audio>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const music = document.getElementById("bgMusic");
    canvas.width = 400; canvas.height = 600;

    let player = { x: 180, y: 530, w: 40, h: 40 };
    let enemies = [], score = 0, gameActive = false;

    function startGame() {
        document.getElementById("start-screen").style.display = "none";
        gameActive = true;
        
        // Ξεκινάει η μουσική
        music.play();

        // Μετά από 30 δευτερόλεπτα (30000ms), σταμάτα τη μουσική
        setTimeout(() => {
            stopMusicSmoothly();
        }, 30000);

        update();
    }

    function stopMusicSmoothly() {
        // Σβήσιμο ήχου σιγά σιγά (Fade out)
        let fadeOut = setInterval(() => {
            if (music.volume > 0.1) {
                music.volume -= 0.1;
            } else {
                music.pause();
                clearInterval(fadeOut);
            }
        }, 200);
    }

    function update(time = 0) {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00f2ff";
        ctx.fillRect(player.x, player.y, player.w, player.h);
        // ... (υπόλοιπος κώδικας κίνησης)
        requestAnimationFrame(update);
    }

    // Κίνηση ποντικιού
    window.addEventListener("mousemove", (e) => {
        let rect = canvas.getBoundingClientRect();
        player.x = (e.clientX - rect.left) - player.w / 2;
    });
</script>
</body>
</html>
